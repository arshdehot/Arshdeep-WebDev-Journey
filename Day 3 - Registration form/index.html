<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Registration Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="gold-line top"></div>
<div class="gold-line bottom"></div>

<div class="card">

    <div class="crown">
        <i class="fa-solid fa-crown"></i>
    </div>

    <h1>REGISTER</h1>

    <p class="subtitle">
        Join our exclusive premium membership
    </p>

    <form>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Email Address">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Confirm Password">
        </div>

        <button>
            JOIN NOW
        </button>

    </form>

    <div class="divider">
        <span>PREMIUM ACCESS</span>
    </div>

    <div class="socials">

        <a href="#">
            <i class="fa-brands fa-google"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

    </div>

</div>

</body>
</html>
